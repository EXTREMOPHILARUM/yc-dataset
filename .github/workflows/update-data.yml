name: Update YC Dataset

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Scrape YC Directory
        run: uv run python3 scraper.py --source yc

      - name: Scrape YC Detail Pages
        run: uv run python3 scraper.py --source yc-details

      - name: Scrape Startups.RIP
        run: uv run python3 scraper.py --source rip

      - name: Transform raw → markdown
        run: uv run python3 transform.py

      - name: Validate no data loss
        run: uv run python3 validate.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly data update $(date -u +%Y-%m-%d)"
            git push
          fi
